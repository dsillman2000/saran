name: auth
description: Authenticate gh and git with GitHub
action: |
  $GRIP auth --help
subcommands:
  - name: status
    description: |-
      Display active account and authentication state on each known GitHub host.

      For each host, the authentication state of each known account is tested and any issues are included in the output.
      Each host section will indicate the active account, which will be used when targeting that host.

      If an account on any host (or only the one given via `--hostname`) has authentication issues,
      the command will exit with 1 and output to stderr.

    options:
      - name: "--active"
        bind_to: ACTIVE
        description: Display the active account only.
        required: false
        default: false
        is_flag: true
      - name: "--hostname"
        bind_to: HOSTNAME
        description: Check only a specific hostname's auth status.
        required: false
        type: str

    action: |
      HOSTNAME_OPT=""
      if [ -n "$HOSTNAME" ]; then
        HOSTNAME_OPT="--hostname $HOSTNAME"
      fi
      ACTIVE_FLAG=""
      if [ "${ACTIVE,,}" = "true" ]; then
        ACTIVE_FLAG="--active"
      fi
      gh auth status $HOSTNAME_OPT $ACTIVE_FLAG
