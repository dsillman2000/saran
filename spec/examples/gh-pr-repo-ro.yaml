# gh-pr-repo-ro
#
# A Saran wrapper around `gh pr` exposing all read-only subcommands locked to a
# specific repository. Intended for use by an LLM agent that should only ever
# inspect pull requests for one known repository.
#
# GH_REPO must be set before the wrapper will start — configure it via:
#   saran env set gh-pr-repo-ro GH_REPO myorg/myrepo
#
# Excluded (mutating): create, close, comment, edit, lock, merge, ready,
#                      reopen, revert, review, unlock, update-branch
#
# Included (read-only): list, status, checkout, checks, diff, view
#
# See gh-pr-ro.yaml for a variant with no fixed repository scope.

name: gh-pr-repo-ro
version: "1.0.0"
help: "Read-only gh pr operations for $GH_REPO"

requires:
  - cli: gh
    version: ">=2.0.0"

vars:
  - name: GH_TOKEN
    required: true
    help: "GitHub auth token — must be set in host environment, not in saran env"
  - name: GH_REPO
    required: true
    help: "Target repository in OWNER/REPO format (e.g. myorg/myrepo)"

commands:
  list:
    help: "List pull requests in $GH_REPO"
    actions:
      - gh: [pr, list, -R, "$GH_REPO"]
        optional_flags:
          - name: --state
            type: enum
            values: [open, closed, merged, all]
            help: "Filter by state (default: open)"
          - name: --assignee
            type: str
            help: "Filter by assignee username"
          - name: --author
            type: str
            help: "Filter by author username"
          - name: --base
            type: str
            help: "Filter by base branch name"
          - name: --head
            type: str
            help: "Filter by head branch name"
          - name: --label
            type: str
            repeated: true
            help: "Filter by label (may be specified multiple times)"
          - name: --limit
            type: int
            help: "Maximum number of PRs to return (default: 30)"
          - name: --search
            type: str
            help: "Search pull requests with a query string (GitHub search syntax)"
          - name: --draft
            type: bool
            help: "Filter to draft pull requests only"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. number,title,state,author)"

  status:
    help: "Show status of pull requests relevant to you in $GH_REPO"
    actions:
      - gh: [pr, status, -R, "$GH_REPO"]
        optional_flags:
          - name: --conflict-status
            type: bool
            help: "Display the merge conflict status of each pull request"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields"

  view:
    help: "View a pull request in $GH_REPO by number, URL, or branch name"
    args:
      - name: pr
        var_name: PR_REF
        type: str
        required: true
        help: "Pull request number, URL, or head branch name"
    actions:
      - gh: [pr, view, "$PR_REF", -R, "$GH_REPO"]
        optional_flags:
          - name: --comments
            type: bool
            help: "Include pull request comments in the output"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. number,title,body,state,reviews)"

  diff:
    help: "View the diff for a pull request in $GH_REPO"
    args:
      - name: pr
        var_name: PR_REF
        type: str
        required: true
        help: "Pull request number, URL, or head branch name"
    actions:
      - gh: [pr, diff, "$PR_REF", -R, "$GH_REPO"]
        optional_flags:
          - name: --patch
            type: bool
            help: "Display diff in patch format"
          - name: --name-only
            type: bool
            help: "Display only names of changed files"
          - name: --color
            type: enum
            values: [always, never, auto]
            help: "Use color in diff output (default: auto)"

  checks:
    help: "Show CI check statuses for a pull request in $GH_REPO"
    args:
      - name: pr
        var_name: PR_REF
        type: str
        required: true
        help: "Pull request number, URL, or head branch name"
    actions:
      - gh: [pr, checks, "$PR_REF", -R, "$GH_REPO"]
        optional_flags:
          - name: --watch
            type: bool
            help: "Watch checks until they all complete"
          - name: --fail-fast
            type: bool
            help: "Exit watch mode on first check failure"
          - name: --required
            type: bool
            help: "Only show checks that are required"
          - name: --interval
            type: int
            help: "Refresh interval in seconds during watch mode (default: 10)"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. name,state,bucket)"

  checkout:
    help: "Check out a pull request branch from $GH_REPO locally"
    args:
      - name: pr
        var_name: PR_REF
        type: str
        required: true
        help: "Pull request number, URL, or head branch name"
    actions:
      - gh: [pr, checkout, "$PR_REF", -R, "$GH_REPO"]
        optional_flags:
          - name: --branch
            type: str
            help: "Local branch name to use (default: the PR head branch name)"
          - name: --detach
            type: bool
            help: "Checkout with a detached HEAD"
          - name: --force
            type: bool
            help: "Reset the existing local branch to the latest state of the pull request"
          - name: --recurse-submodules
            type: bool
            help: "Update all submodules after checkout"
