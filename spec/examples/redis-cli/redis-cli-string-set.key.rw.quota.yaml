# redis-cli-string-set.key.rw.quota
#
# A Saran wrapper around `redis-cli` exposing read-only inspection of one fixed
# string key plus a quota-guarded write command. Intended as a minimal example
# of a write-capable wrapper for integration tests.
#
# The caller may only read or write REDIS_KEY. The number of allowed SET
# operations is bounded by REDIS_SET_QUOTA (default: 1).
#
# Excluded: arbitrary key selection, expiration modifiers, conditional SET
#           modifiers, and all other mutating Redis commands.
#
# Included (read-only): get
# Included (quota-guarded write): set

name: redis-cli-string-set.key.rw.quota
version: "1.0.0"
help: "Read and quota-guarded write access to Redis key $REDIS_KEY"

requires:
  - cli: redis-cli
    version: ">=6.0.0"

vars:
  - name: REDISCLI_AUTH
    required: true
    help: "Redis password for $REDIS_HOST:$REDIS_PORT — must be set in host environment, not in saran env"
  - name: REDIS_HOST
    default: 127.0.0.1
    help: "Target Redis hostname"
  - name: REDIS_PORT
    default: "6379"
    help: "Target Redis TCP port"
  - name: REDIS_DB
    default: "0"
    help: "Target Redis database number"
  - name: REDIS_KEY
    default: "fixture:message"
    help: "Fixed Redis string key the caller may read or write"
  - name: REDIS_SET_QUOTA
    default: "1"
    help: "Maximum number of SET operations allowed for $REDIS_KEY (default: 1)"

quotas:
  - command: set
    limit: $REDIS_SET_QUOTA

commands:
  get:
    help: "Read the value of $REDIS_KEY"
    actions:
      - redis-cli: [-h, "$REDIS_HOST", -p, "$REDIS_PORT", -n, "$REDIS_DB", GET, "$REDIS_KEY"]

  set:
    help: "Set the value of $REDIS_KEY (quota: $REDIS_SET_QUOTA)"
    args:
      - name: value
        var_name: VALUE
        type: str
        required: true
        help: "New string value to store in $REDIS_KEY"
    actions:
      - redis-cli: [-h, "$REDIS_HOST", -p, "$REDIS_PORT", -n, "$REDIS_DB", SET, "$REDIS_KEY", "$VALUE"]
