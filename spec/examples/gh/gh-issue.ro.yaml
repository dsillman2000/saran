# gh-issue.ro
#
# A Saran wrapper around `gh issue` exposing all read-only subcommands with no
# fixed repository scope. Intended for use by an LLM agent inspecting issues
# across any repository. The caller's ambient GH context determines which
# repository is targeted.
#
# Excluded (mutating): create, close, comment, delete, develop, edit, lock,
#                      pin, reopen, transfer, unlock, unpin
#
# Included (read-only): list, status, view
#
# See gh-issue.repo.ro.yaml for a variant that locks operations to a specific
# repository via a required GH_REPO variable.

name: gh-issue.ro
version: "1.0.0"
help: "Read-only gh issue operations (no fixed repo scope)"

requires:
  - cli: gh
    version: ">=2.0.0"

vars:
  - name: GH_TOKEN
    required: true
    help: "GitHub auth token — must be set in host environment, not in saran env"

commands:
  list:
    help: "List issues"
    actions:
      - gh: [issue, list]
        optional_flags:
          - name: --state
            type: enum
            values: [open, closed, all]
            help: "Filter by state (default: open)"
          - name: --assignee
            type: str
            help: "Filter by assignee username, or @me"
          - name: --author
            type: str
            help: "Filter by author username"
          - name: --label
            type: str
            repeated: true
            help: "Filter by label (may be specified multiple times)"
          - name: --milestone
            type: str
            help: "Filter by milestone number or title"
          - name: --mention
            type: str
            help: "Filter by mentioned username"
          - name: --limit
            type: int
            help: "Maximum number of issues to return (default: 30)"
          - name: --search
            type: str
            help: "Search issues with a query string (GitHub issue search syntax)"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. number,title,state,labels)"
          - name: --repo
            type: str
            help: "Target repository in OWNER/REPO format (e.g. myorg/myrepo)"

  status:
    help: "Show issues relevant to you (assigned, mentioned, opened)"
    actions:
      - gh: [issue, status]
        optional_flags:
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields"
          - name: --repo
            type: str
            help: "Target repository in OWNER/REPO format (e.g. myorg/myrepo)"

  view:
    help: "View an issue by number or URL"
    args:
      - name: issue
        var_name: ISSUE_REF
        type: str
        required: true
        help: "Issue number or URL"
    actions:
      - gh: [issue, view, "$ISSUE_REF"]
        optional_flags:
          - name: --comments
            type: bool
            help: "Include issue comments in the output"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. number,title,body,state,labels,comments)"
          - name: --repo
            type: str
            help: "Target repository in OWNER/REPO format (e.g. myorg/myrepo)"
