# gh-run.ro
#
# A Saran wrapper around `gh run` exposing all read-only subcommands with no
# fixed repository scope. Intended for use by an LLM agent inspecting workflow
# runs across any repository. The caller's ambient GH context determines which
# repository is targeted.
#
# Excluded (mutating): cancel, delete, rerun
#
# Included (read-only): list, view, watch, download
#
# See gh-run.repo.ro.yaml for a variant that locks operations to a specific
# repository via a required GH_REPO variable.

name: gh-run.ro
version: "1.0.0"
help: "Read-only gh run operations (no fixed repo scope)"

requires:
  - cli: gh
    version: ">=2.0.0"

vars:
  - name: GH_TOKEN
    required: true
    help: "GitHub auth token — must be set in host environment, not in saran env"

commands:
  list:
    help: "List recent workflow runs"
    actions:
      - gh: [run, list]
        optional_flags:
          - name: --all
            type: bool
            help: "Include disabled workflows"
          - name: --branch
            type: str
            help: "Filter runs by branch name"
          - name: --commit
            type: str
            help: "Filter runs by commit SHA"
          - name: --created
            type: str
            help: "Filter runs by created date (e.g. >2023-01-01)"
          - name: --event
            type: str
            help: "Filter runs by triggering event (e.g. push, pull_request, workflow_dispatch)"
          - name: --jq
            type: str
            help: "Filter JSON output using a jq expression"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. name,status,conclusion,headBranch,createdAt)"
          - name: --limit
            type: int
            help: "Maximum number of runs to return (default: 20)"
          - name: --status
            type: enum
            values:
              [
                queued,
                completed,
                in_progress,
                requested,
                waiting,
                pending,
                action_required,
                cancelled,
                failure,
                neutral,
                skipped,
                stale,
                startup_failure,
                success,
                timed_out,
              ]
            help: "Filter runs by status"
          - name: --template
            type: str
            help: "Format JSON output using a Go template"
          - name: --user
            type: str
            help: "Filter runs by the user who triggered them"
          - name: --workflow
            type: str
            help: "Filter runs by workflow name or filename"

  view:
    help: "View a summary of a workflow run"
    args:
      - name: run-id
        var_name: RUN_ID
        type: str
        required: true
        help: "Workflow run ID"
    actions:
      - gh: [run, view, "$RUN_ID"]
        optional_flags:
          - name: --attempt
            type: int
            help: "The attempt number of the workflow run"
          - name: --exit-status
            type: bool
            help: "Exit with non-zero status if the run failed"
          - name: --job
            type: str
            help: "View a specific job ID from the run"
          - name: --jq
            type: str
            help: "Filter JSON output using a jq expression"
          - name: --json
            type: str
            help: "Output JSON with the specified comma-separated fields (e.g. name,status,conclusion,jobs,headBranch)"
          - name: --log
            type: bool
            help: "View full log for the run or a specific job"
          - name: --log-failed
            type: bool
            help: "View log for any failed steps in the run or a specific job"
          - name: --template
            type: str
            help: "Format JSON output using a Go template"
          - name: --verbose
            type: bool
            help: "Show job steps"

  watch:
    help: "Watch a workflow run until it completes, showing its progress"
    args:
      - name: run-id
        var_name: RUN_ID
        type: str
        required: true
        help: "Workflow run ID"
    actions:
      - gh: [run, watch, "$RUN_ID"]
        optional_flags:
          - name: --compact
            type: bool
            help: "Show only relevant or failed steps"
          - name: --exit-status
            type: bool
            help: "Exit with non-zero status if the run fails"
          - name: --interval
            type: int
            help: "Refresh interval in seconds (default: 3)"

  download:
    help: "Download artifacts generated by a workflow run"
    args:
      - name: run-id
        var_name: RUN_ID
        type: str
        required: true
        help: "Workflow run ID"
    actions:
      - gh: [run, download, "$RUN_ID"]
        optional_flags:
          - name: --dir
            type: str
            help: "Directory to download artifacts into (default: .)"
          - name: --name
            type: str
            repeated: true
            help: "Download artifacts matching this name (may be specified multiple times)"
          - name: --pattern
            type: str
            repeated: true
            help: "Download artifacts matching this glob pattern (may be specified multiple times)"
